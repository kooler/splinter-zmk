# Splinter Keyboard Configuration
# SPDX-License-Identifier: MIT

# Enable deep sleep after 15 minutes of inactivity
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Increase Bluetooth TX power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable battery reporting
CONFIG_ZMK_BATTERY_REPORTING=y

# Keyboard name as it appears in Bluetooth
CONFIG_ZMK_KEYBOARD_NAME="Splinter"

# Split keyboard settings
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
