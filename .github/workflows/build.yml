# Splinter Keyboard ZMK Firmware Build
# Builds firmware for nice!nano v2 controllers
# Triggered on push to main or manual dispatch

name: Build ZMK Firmware

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: nice_nano/nrf52840/zmk
            shield: splinter_left
          - board: nice_nano/nrf52840/zmk
            shield: splinter_right
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/west.yml', '**/build.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: West Build (${{ matrix.shield }})
        run: |
          west build -s zmk/app -b ${{ matrix.board }} -- \
            -DSHIELD=${{ matrix.shield }} \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename artifacts
        run: |
          mkdir -p artifacts
          BOARD_SAFE=$(echo "${{ matrix.board }}" | tr '/' '_')
          if [ -f build/zephyr/zmk.uf2 ]; then
            cp build/zephyr/zmk.uf2 "artifacts/${{ matrix.shield }}-${BOARD_SAFE}.uf2"
          fi

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.shield }}
          path: artifacts/*.uf2
          if-no-files-found: error

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Merge artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: firmware
          pattern: firmware-*
          delete-merged: true

  release:
    runs-on: ubuntu-latest
    needs: merge
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - name: Create/Update Latest Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete latest --cleanup-tag -y || true
          gh release create latest firmware/*.uf2 \
            --title "Latest Firmware" \
            --notes "Built from commit ${{ github.sha }} on $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --latest
