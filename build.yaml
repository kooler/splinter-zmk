# Splinter Keyboard ZMK Build Configuration
# This file defines firmware builds for GitHub Actions

include:
  - board: nice_nano/nrf52840/zmk
    shield: splinter_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
  - board: nice_nano/nrf52840/zmk
    shield: splinter_right
